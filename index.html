@keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}

.animate-floaty{animation:floaty 3s ease-in-out infinite}

.animate-shake{animation:shake .4s}

/* ============ 1.5. SUPABASE (облачное хранилище фото) ============ */
const SB_URL = 'https://kupqdpruksjvvzqwxckc.supabase.co';
const SB_KEY = 'sb_publishable_324_aQsKoeWQxdac7H4t3Q_BYPuI92O';

/* ============ 2. СОСТОЯНИЕ (localStorage) ============ */
const LS = 'muradworld_v1';
const SCHEMA_VERSION = 2;
function def(){ return { version:SCHEMA_VERSION, keys:{pixel:false,tree:false,sport:false,chess:false}, parts:0, ach:{}, interests:['LEGO','Minecraft','Шахматы','AI','Баскетбол'], sound:true, sky:'auto', legoDone:0, mc:null, legoGallery:[] }; }
let S = (()=>{
  try{
    const r=localStorage.getItem(LS);
    if(r){
      const parsed = JSON.parse(r);
      const merged = Object.assign(def(), parsed);
      // Миграция: если версия сохранённых данных старее текущей схемы,
      // не теряем прогресс — просто дополняем недостающими полями (уже сделано через Object.assign).
      merged.version = SCHEMA_VERSION;
      return merged;
    }
  }catch(e){ console.warn('Не удалось прочитать сохранение, начинаем заново', e); }
  return def();
})();
function save(){ try{ localStorage.setItem(LS, JSON.stringify(S)); }catch(e){ console.warn('Не удалось сохранить прогресс', e); toast('⚠️ Не получилось сохранить прогресс'); } }

/* ============ 3. ХЕЛПЕРЫ ============ */
const $ = s => document.querySelector(s);
const pick = a => a[Math.floor(Math.random()*a.length)];
const sleep = ms => new Promise(r=>setTimeout(r,ms));
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const keyCount = () => Object.values(S.keys).filter(Boolean).length;
const treeFor = n => ['🌳','🌲','🌴'][([...n].reduce((a,c)=>a+c.charCodeAt(0),0))%3];

/* ============ 4. ЗВУК (Web Audio API) ============ */
const SFX = {
  ctx:null, on:true, amb:null,
  ensure(){ if(!this.ctx){ try{ this.ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
            if(this.ctx && this.ctx.state==='suspended') this.ctx.resume(); },
  tone(f,d=0.12,type='sine',v=0.12,w=0){
    if(!this.on) return; this.ensure(); if(!this.ctx) return;
    const t=this.ctx.currentTime+w, o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type; o.frequency.value=f;
    g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.0001,t+d);
    o.connect(g); g.connect(this.ctx.destination); o.start(t); o.stop(t+d+0.02);
  },
  click(){ this.tone(700,.05,'square',.04); },
  pop(){ this.tone(340,.07,'sine',.08); },
  success(){ this.tone(523,.12,'sine',.1); this.tone(659,.12,'sine',.1,.09); this.tone(784,.22,'sine',.1,.18); },
  error(){ this.tone(160,.22,'sawtooth',.06); },
  key(){ [880,1109,1319,1760].forEach((f,i)=>this.tone(f,.16,'triangle',.09,i*.08)); }
};
function ambientStart(){
  if(SFX.amb || !S.sound) return; SFX.ensure(); if(!SFX.ctx) return;
  const c=SFX.ctx, g=c.createGain(); g.gain.value=0.016; g.connect(c.destination);
  const o1=c.createOscillator(), o2=c.createOscillator();
  o1.frequency.value=96; o2.frequency.value=144.5;
  o1.connect(g); o2.connect(g); o1.start(); o2.start();
  SFX.amb={o1,o2,g};
}
function ambientStop(){ if(!SFX.amb) return; try{ SFX.amb.o1.stop(); SFX.amb.o2.stop(); SFX.amb.g.disconnect(); }catch(e){} SFX.amb=null; }
document.addEventListener('pointerdown', ()=>{ if(S.sound) ambientStart(); });

/* ============ 5. UI: тосты, конфетти, модалки ============ */
function toast(msg){
  const t=document.createElement('div');
  t.className='fixed left-1/2 -translate-x-1/2 bottom-24 z-[70] bg-night2 border border-white/15 text-sm px-4 py-2.5 rounded-2xl shadow-2xl animate-pop max-w-[90vw] text-center';
  t.textContent=msg; $('#toastRoot').appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity .4s'; t.style.opacity='0'; setTimeout(()=>t.remove(),420); },2600);
}
function confetti(n=80){
  const colors=['#F59E0B','#6D28D9','#10B981','#38BDF8','#F472B6','#F8FAFC'];
  const root=$('#confettiRoot');
  for(let i=0;i<n;i++){
    const s=document.createElement('span'); s.className='confetti';
    const size=6+Math.random()*8;
    s.style.cssText=`left:${Math.random()*100}vw;width:${size}px;height:${size*0.6}px;background:${pick(colors)};animation-duration:${2+Math.random()*2.5}s;animation-delay:${Math.random()*0.4}s;`;
    root.appendChild(s); s.addEventListener('animationend',()=>s.remove());

/* --- Шахматная задача: ♚a8, ♔c6, ♕b5 → ♕b7# --- */
function buildChess(){
  const solved=S.keys.chess;
  const pieces = solved ? {'a8':'k','c6':'K','b7':'Q'} : {'a8':'k','c6':'K','b5':'Q'};
  const el=$('#chessBoard'); if(!el) return;
  let h='<div class="grid grid-cols-8 w-[280px] h-[280px] md:w-80 md:h-80 rounded-lg overflow-hidden border-4 border-slate-600 shadow-2xl">';
  for(let r=0;r<8;r++)for(let f=0;f<8;f++){
    const sq='abcdefgh'[f]+(8-r);
    const dark=(r+f)%2===1;
    const p=pieces[sq];
    const glyph = p ? (p==='Q'?'♛':'♚') : '';
    const color = p && p===p.toUpperCase() ? 'color:#F8FAFC;text-shadow:0 0 3px #000,0 0 3px #000' : 'color:#0F172A';
    h+=`<button data-sq="${sq}" class="flex items-center justify-center text-3xl md:text-4xl ${dark?'bg-[#B58863]':'bg-[#F0D9B5]'}" style="${color}" aria-label="Клетка ${sq}">${glyph}</button>`;
  }
  h+='</div>';
  el.innerHTML=h;
  el.querySelector('.grid').addEventListener('click', onChessClick);
}
function setChessMsg(t){ const m=$('#chessMsg'); if(m) m.textContent=t; }
// Клетки, куда ферзь легально ходит с b5 (вертикаль b, горизонталь 5, диагонали) —
// нужны, чтобы отличать "легальный, но не мат" ход от случайного клика мимо.
function queenReaches(from, to){
  const [ff,fr]=[from.charCodeAt(0), +from[1]], [tf,tr]=[to.charCodeAt(0), +to[1]];
  if(from===to) return false;
  const df=tf-ff, dr=tr-fr;
  return df===0 || dr===0 || Math.abs(df)===Math.abs(dr);
}
function onChessClick(e){
  const b=e.target.closest('[data-sq]'); if(!b) return;
  const sq=b.dataset.sq;
  if(S.keys.chess) return;
  if(sq==='b7'){
    SFX.success(); confetti(80);
    setChessMsg('♛ b7 — шах и мат! Королю некуда бежать. Блестяще! 🎉');
    awardKey('chess','Шах и мат');
    award('chessWin','Решил задачу совы Logic',3);
    buildChess();
  } else if(sq==='b5'){
    SFX.pop(); setChessMsg('Ферзь стоит на b5. Отправь её выше — прямо к королю!');
  } else if(sq==='c6'){
    SFX.pop(); setChessMsg('Король на c6 поддерживает ферзя — его трогать не нужно.');
  } else if(queenReaches('b5', sq)){
    // Ход геометрически возможен для ферзя, но не даёт мат — объясняем, почему конкретно
    SFX.pop();
    b.classList.add('animate-shake'); setTimeout(()=>b.classList.remove('animate-shake'),450);
    setChessMsg(`Ферзь может пойти на ${sq}, но это не мат — у чёрного короля останется путь для отступления. Попробуй встать так, чтобы отрезать все клетки вокруг короля.`);
  } else {
    SFX.error();
    b.classList.add('animate-shake'); setTimeout(()=>b.classList.remove('animate-shake'),450);
    setChessMsg(pick(['Ферзь так ходить не может — только по прямой или диагонали.','Подсказка: решающий ход — по линии "b".','Король заперт в углу — нанеси финальный удар ферзём!']));
  }
}

       <div class="mt-4 flex flex-wrap gap-2">
         ${['⬆️','⬇️','⬅️','➡️'].map((a,i)=>`<button onclick="cgPush(${i})" class="w-12 h-12 text-xl rounded-xl bg-white/10 border border-white/15 hover:bg-grape/40 active:scale-95 transition" aria-label="Шаг ${a}">${a}</button>`).join('')}

         <button onclick="cgReset()" class="px-4 h-12 rounded-xl bg-white/10 border border-white/15 hover:bg-white/20 transition">↺</button>
       </div>
       <div id="cgProg" class="mt-4 min-h-[3rem] flex flex-wrap gap-1.5"></div>
       <div id="cgMsg" class="text-sm text-slate-400 mt-2">Программа: нажимай стрелки, затем «Запустить».</div>
     </div>
     <div class="mx-auto">
       <div class="relative inline-block bg-night2 p-2 rounded-2xl border border-white/10">

         <div class="absolute inset-2 pointer-events-none">
           <div id="cgRobot" class="absolute w-1/5 h-1/5 flex items-center justify-center text-2xl md:text-3xl transition-transform duration-300" style="transform:translate(0%,400%)">🤖</div>
         </div>
       </div>
     </div>
   </div>`);
  cgDraw();
};
function cgDraw(){
  const rb=$('#cgRobot'); if(rb) rb.style.transform=`translate(${cgPos[0]*100}%, ${cgPos[1]*100}%)`;
  const p=$('#cgProg'); if(p) p.innerHTML = cgProg.map(d=>`<span class="px-2.5 py-1 rounded-lg bg-grape/40 border border-grape text-sm">${['⬆️','⬇️','⬅️','➡️'][d]}</span>`).join('') || '<span class="text-xs text-slate-500">пусто</span>';
}
function cgPush(d){ if(cgBusy) return; if(cgProg.length>=20){ toast('Лимит программы — 20 шагов ✋'); return; } cgProg.push(d); SFX.click(); cgDraw(); }
function cgUndo(){ cgProg.pop(); cgDraw(); }
function cgReset(){ cgPos=[...CG.start]; cgProg=[]; cgBusy=false; cgDraw(); const m=$('#cgMsg'); if(m) m.textContent='Программа очищена.'; }
async function cgRun(){
  if(cgBusy || !cgProg.length) return; cgBusy=true;
  const runToken = Symbol('cgRun'); // уникальная метка этого запуска
  cgRun._token = runToken;
  onLeave(()=>{ cgBusy=false; }); // страховка: если ушли со страницы, busy точно сбросится
  const D=[[0,-1],[0,1],[-1,0],[1,0]];
  for(const d of cgProg){
    await sleep(320);
    if(!$('#cgRobot') || cgRun._token!==runToken){ cgBusy=false; return; } // вышли со страницы или запустили заново
    const nx=cgPos[0]+D[d][0], ny=cgPos[1]+D[d][1];
    if(nx<0||ny<0||nx>=CG.cols||ny>=CG.rows||CG.walls.some(w=>w[0]===nx&&w[1]===ny)){
      SFX.error(); const m=$('#cgMsg'); if(m) m.textContent='💥 Робот врезался в стену! Попробуй другой маршрут.';
      cgPos=[...CG.start]; cgDraw(); cgBusy=false; return;
    }
    cgPos=[nx,ny]; cgDraw();
    if(nx===CG.star[0]&&ny===CG.star[1]){
      SFX.success(); confetti(70);
      const m=$('#cgMsg'); if(m) m.textContent='🎉 Программа сработала! Робот достиг звезды!';
      award('codeStar','Робот дошёл до звезды',3);
      cgBusy=false; return;
    }
  }
  const m=$('#cgMsg'); if(m) m.textContent='🤔 Робот остановился, но до звезды не дошёл. Добавь шагов!';
  cgBusy=false;
}

const PH_ROT = [-6,-3,-1,2,4,7,-4,3,-2,5,-7,1,6,-5,2];

async function phFetch(){
  if(!sb) return [];
  const { data, error } = await sb.from('photos').select('*').order('created_at', { ascending:false });
  if(error){ console.warn('phFetch error', error); return []; }

  if(phLoading) return; phLoading=true;
  const board = $('#phBoard');

  if(!phCache.length){
    board.innerHTML = `<div class="text-center text-slate-400 text-sm py-10 w-full">Доска пока пустая — стань первым, кто прикрепит фото! 📌</div>`;

      <div class="bg-white p-3 pb-8 rounded-sm shadow-2xl w-40 md:w-48 animate-pop card-hover cursor-pointer" style="transform:rotate(${PH_ROT[i%PH_ROT.length]}deg)" onclick="phZoom(${i})">
        <div class="w-full aspect-square bg-slate-200 overflow-hidden rounded-sm">
          <img src="${esc(p.url)}" alt="${esc(p.caption||'Фото Мурада')}" class="w-full h-full object-cover" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'w-full h-full flex items-center justify-center text-3xl\\'>🖼️</div>'"/>
        </div>
        <div class="text-center text-night text-xs mt-2 font-semibold truncate px-1" style="font-family:'Pixelify Sans',cursive">${esc(p.caption || '')}</div>
      </div>`).join('');

}

function phZoom(i){
  const p = phCache[i]; if(!p) return; SFX.pop();
  openModal(p.caption || 'Фото Мурада', '📸', `<img src="${esc(p.url)}" alt="${esc(p.caption||'')}" class="w-full rounded-xl border border-white/10"/>`);
}

/* ============ 19. SPACE PORT — СТРОЙКА МЕЧТЫ ============ */
let launching=false;
ROUTES.space = function renderSpace(){
  app.innerHTML = pageShell(ZONES[8], `
   <div class="relative overflow-hidden rounded-3xl border border-dashed border-white/20 bg-gradient-to-b from-indigo-950 to-night p-6 md:p-10">
     <div class="fog absolute inset-0 opacity-40 pointer-events-none"></div>
     <div class="relative grid md:grid-cols-2 gap-8 items-center">
       <div>
         <div class="font-pixel text-gold text-xl">🚧 Район проектируется</div>
         <p class="text-slate-300 text-sm mt-2">Здесь пока стройка — как и у больших мечт Мурада. Но стартовая площадка уже готова!</p>
         <div class="mt-5 space-y-2">
           ${['Сделать свою видеоигру 🎮','Выучить Python и JavaScript 💻','Выиграть городской турнир по шахматам ♟️','Поступить в IT-университет 🎓','Запустить стартап 🚀'].map(m=>`
             <div class="flex items-center gap-3 bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm">
               <span>🛰️</span><span class="flex-1">${m}</span><span class="text-[10px] font-pixel text-gold">0%</span>
             </div>`).join('')}
         </div>
       </div>
       <div class="text-center">
         <div id="rocketCount" class="font-pixel text-5xl text-gold h-16"></div>
         <div id="rocket" class="text-7xl md:text-8xl inline-block transition-all duration-700">🚀</div>
         <div class="mt-4"><button onclick="launch()" class="px-8 py-3 rounded-2xl bg-gradient-to-r from-grape to-indigo-600 font-pixel hover:brightness-110 active:scale-95 transition">Запустить мечту 🚀</button></div>
       </div>
     </div>
   </div>`);
};
function launch(){
  if(launching) return; launching=true; SFX.click();
  const rc=$('#rocketCount'), r=$('#rocket');
  let n=3; rc.textContent=n;
  const iv=setInterval(()=>{
    n--;
    if(n>0){ rc.textContent=n; SFX.pop(); }
    else{
      clearInterval(iv); rc.textContent='GO!';
      SFX.success(); confetti(100);
      r.style.transform='translateY(-160px) rotate(-8deg) scale(1.3)'; r.style.opacity='0';
      setTimeout(()=>{ rc.textContent=''; r.style.transform=''; r.style.opacity='1'; launching=false; toast('🌟 Мечта запущена! Она обязательно сбудется!'); },1600);
    }
  },700);
}

/* ============ 20. HIDDEN GATE — СКРЫТЫЕ ВРАТА ============ */

  app.innerHTML = pageShell(ZONES[9], `
   <div class="max-w-3xl mx-auto">
     <div class="relative mx-auto w-72 h-80" style="perspective:900px">
       <div class="absolute inset-0 rounded-2xl bg-black/60 border border-white/10 flex items-center justify-center">
         ${open
           ? '<div class="text-center animate-pop"><div class="text-7xl">🏆</div><div class="font-pixel text-gold mt-2">Строитель Мира</div></div>'
           : '<div class="text-5xl opacity-40">🔒</div>'}
       </div>
       <div class="gate-door absolute left-0 top-0 w-1/2 h-full bg-gradient-to-r from-slate-700 to-slate-600 rounded-l-2xl border border-white/10 flex items-center justify-end pr-2 ${open?'gate-open-l':''}" style="transform-origin:left center"><span class="text-2xl opacity-50">◀</span></div>
       <div class="gate-door absolute right-0 top-0 w-1/2 h-full bg-gradient-to-l from-slate-700 to-slate-600 rounded-r-2xl border border-white/10 flex items-center justify-start pl-2 ${open?'gate-open-r':''}" style="transform-origin:right center"><span class="text-2xl opacity-50">▶</span></div>
     </div>
     <div class="mt-8 grid grid-cols-4 gap-3 max-w-sm mx-auto">
       ${RIDDLES.map(r=>`<div class="aspect-square rounded-full border-2 flex items-center justify-center text-2xl ${S.keys[r.k]?'border-gold bg-gold/20':'border-white/15 bg-white/5'}">${S.keys[r.k]?'🗝️':'❔'}</div>`).join('')}
     </div>
     ${open ? `
       <div class="mt-8 text-center bg-gradient-to-br from-gold/20 to-grape/20 border border-gold/40 rounded-3xl p-8 animate-pop">
         <div class="font-pixel text-2xl text-gold">🎉 Врата открыты!</div>
         <p class="text-slate-200 mt-3 text-sm md:text-base">Ты нашёл все 4 ключа и вошёл в тайную комнату. Вот главный секрет MURAD'S WORLD: <b>любой мир строится из любопытства, игры и маленьких шагов.</b> Впереди — ещё 70% неоткрытых районов!</p>
         <button onclick="megaConfetti()" class="mt-5 px-6 py-3 rounded-2xl bg-gold text-night font-pixel hover:brightness-110 transition">🎊 Праздновать!</button>
       </div>` : `
       <div class="mt-8 space-y-2">
         <div class="font-pixel text-center text-white mb-3">Найдено ключей: ${kc}/4 · Загадки:</div>
         ${RIDDLES.map(r=>`<div class="flex gap-3 items-start bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm ${S.keys[r.k]?'opacity-50 line-through':''}"><span>${S.keys[r.k]?'✅':'🧩'}</span><span class="text-slate-300">${r.t}</span></div>`).join('')}
       </div>`}
   </div>`);
  if(open) award('gateOpen','Вошёл в Скрытые Врата',10);
};
function megaConfetti(){ SFX.key(); confetti(200); }
